<script>
  // Datum
  const d = new Date();
  const months = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
  document.getElementById('currentDate').textContent =
    `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

  // CHAT med Claude API
  const CONTEXT = `Du är en hjälpsam assistent på webbsidan Skolkollen. 
Du svarar ENBART på frågor baserat på de dokument och vittnesmål som publicerats på sidan.
Dokumenten handlar om en skola som fått tillsynsbeslut från Skolinspektionen (Dnr 2024:0000) 
gällande brister i trygghet och studiero, ett föreläggande om förbättringsåtgärder (Dnr 2023:0000), 
samt ett kommunalt protokoll om kvalitetsuppföljning (BUN-2023:0000).
Vittnesmål från föräldrar beskriver upplevd mobbning och bristande kommunikation från skolan.
Håll svaren kortfattade, faktabaserade och neutrala. Spekulera inte. 
Svara på svenska.`;

  let chatHistory = [];

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    document.getElementById('chatSend').disabled = true;

    appendMsg('user', msg);
    chatHistory.push({ role: 'user', content: msg });

    const typing = appendTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: CONTEXT,
          messages: chatHistory
        })
      });

      const data = await res.json();
      typing.remove();

      const reply = data.content?.[0]?.text || 'Kunde inte hämta svar.';
      appendMsg('ai', reply);
      chatHistory.push({ role: 'assistant', content: reply });

    } catch (e) {
      typing.remove();
      appendMsg('ai', 'Fel vid anslutning. Försök igen senare.');
    }

    document.getElementById('chatSend').disabled = false;
  }

  function appendMsg(role, text) {
    const box = document.getElementById('chatMessages');
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = `<div class="msg-label">${role === 'ai' ? 'Assistent' : 'Du'}</div>${escHtml(text)}`;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  }

  function appendTyping() {
    const box = document.getElementById('chatMessages');
    const el = document.createElement('div');
    el.className = 'msg ai';
    el.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
